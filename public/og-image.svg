<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f5d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff9e6;stop-opacity:1" />
    </linearGradient>
    <filter id="clay-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#2d6a2d" flood-opacity="0.18"/>
    </filter>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a3a1a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="#a8e6a8" opacity="0.4"/>
  <circle cx="1140" cy="100" r="80" fill="#ffe082" opacity="0.35"/>
  <circle cx="60" cy="560" r="50" fill="#ffe082" opacity="0.3"/>
  <circle cx="1160" cy="540" r="70" fill="#a8e6a8" opacity="0.35"/>
  <circle cx="600" cy="-20" r="100" fill="#c8e6c9" opacity="0.3"/>

  <!-- Confetti dots -->
  <circle cx="200" cy="150" r="8" fill="#4caf50" opacity="0.5"/>
  <circle cx="950" cy="200" r="6" fill="#ffc107" opacity="0.6"/>
  <circle cx="150" cy="400" r="7" fill="#ff7043" opacity="0.4"/>
  <circle cx="1050" cy="420" r="9" fill="#4caf50" opacity="0.5"/>
  <circle cx="300" cy="520" r="6" fill="#ffc107" opacity="0.5"/>
  <circle cx="880" cy="520" r="8" fill="#ff7043" opacity="0.4"/>
  <circle cx="700" cy="580" r="7" fill="#4caf50" opacity="0.4"/>
  <circle cx="420" cy="80" r="9" fill="#ffc107" opacity="0.5"/>
  <circle cx="820" cy="100" r="6" fill="#ff7043" opacity="0.4"/>

  <!-- Star decorations -->
  <text x="170" y="220" font-size="28" opacity="0.5" fill="#ffc107">★</text>
  <text x="1000" y="180" font-size="22" opacity="0.45" fill="#4caf50">★</text>
  <text x="120" y="480" font-size="20" opacity="0.4" fill="#ff7043">★</text>
  <text x="1060" y="490" font-size="26" opacity="0.45" fill="#ffc107">★</text>

  <!-- Main card -->
  <rect x="180" y="80" width="840" height="470" rx="36" ry="36"
        fill="white" opacity="0.88" filter="url(#card-shadow)"/>

  <!-- Top accent bar -->
  <rect x="180" y="80" width="840" height="12" rx="12" ry="12" fill="#4caf50" opacity="0.7"/>

  <!-- Chapter badge -->
  <rect x="460" y="108" width="280" height="38" rx="19" ry="19"
        fill="#4caf50" filter="url(#clay-shadow)"/>
  <text x="600" y="133" font-family="'Fredoka', 'Nunito', Arial, sans-serif"
        font-size="16" font-weight="600" fill="white" text-anchor="middle"
        letter-spacing="2">✦ CHAPTER 1 · AWAL CERITA ✦</text>

  <!-- Baby name -->
  <text x="600" y="250" font-family="'Fredoka', 'Nunito', Arial, sans-serif"
        font-size="78" font-weight="700" fill="#1b5e20" text-anchor="middle"
        letter-spacing="-1">Emir Ayden</text>
  <text x="600" y="330" font-family="'Fredoka', 'Nunito', Arial, sans-serif"
        font-size="78" font-weight="700" fill="#2e7d32" text-anchor="middle"
        letter-spacing="-1">Mateen</text>

  <!-- Divider -->
  <line x1="350" y1="360" x2="850" y2="360" stroke="#a5d6a7" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Invitation label -->
  <text x="600" y="405" font-family="'Lexend', 'Nunito', Arial, sans-serif"
        font-size="20" fill="#555" text-anchor="middle" letter-spacing="3">UNDANGAN AKIKAH</text>

  <!-- Date & Location row -->
  <rect x="280" y="425" width="260" height="90" rx="20" ry="20"
        fill="#e8f5e9" filter="url(#clay-shadow)"/>
  <rect x="660" y="425" width="260" height="90" rx="20" ry="20"
        fill="#fff9e6" filter="url(#clay-shadow)"/>

  <!-- Calendar icon + date -->
  <text x="310" y="460" font-size="22" fill="#4caf50">📅</text>
  <text x="345" y="460" font-family="'Fredoka', 'Nunito', Arial, sans-serif"
        font-size="18" font-weight="600" fill="#2e7d32">Sabtu</text>
  <text x="310" y="490" font-family="'Lexend', 'Nunito', Arial, sans-serif"
        font-size="15" fill="#388e3c">4 April 2026 · 10:00 WIB</text>

  <!-- Location icon + place -->
  <text x="690" y="460" font-size="22" fill="#f9a825">📍</text>
  <text x="725" y="460" font-family="'Fredoka', 'Nunito', Arial, sans-serif"
        font-size="18" font-weight="600" fill="#5d4037">Batang Kuis</text>
  <text x="690" y="490" font-family="'Lexend', 'Nunito', Arial, sans-serif"
        font-size="15" fill="#795548">Mateen's House</text>

  <!-- Parents note -->
  <text x="600" y="558" font-family="'Lexend', 'Nunito', Arial, sans-serif"
        font-size="15" fill="#777" text-anchor="middle">
    Andre Pratama &amp; Syaras Saryang Putri
  </text>
</svg>
